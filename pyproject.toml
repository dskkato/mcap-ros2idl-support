[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mcap-ros2idl-support"
version = "0.0.1"
description = "A command-line and Python tool to read and parse ROS 2 MCAP bag files without a ROS 2 runtime."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "ISC"}
authors = [{name = "dskkato"}]
dependencies = [
    "mcap>=1.3.0",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: ISC License (ISCL)",
    "Operating System :: OS Independent",
]

[project.optional-dependencies]
dev = [
    "black",
    "flake8",
    "isort",
    "pytest",
]

[project.scripts]
mcap-ros2idl-support = "mcap_ros2idl_support.cli:main"

[tool.setuptools]
packages = ["mcap_ros2idl_support"]

[tool.setuptools.package-data]
mcap_ros2idl_support = [
    "dist/index.js",
]

[tool.black]
line-length = 88

[tool.isort]
profile = "black"

